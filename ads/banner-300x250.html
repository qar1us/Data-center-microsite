<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:300px;height:250px;overflow:hidden}
.ad{position:relative;width:300px;height:250px;overflow:hidden;background:#151C42;display:flex;flex-direction:column;padding:22px;font-family:"Archivo",sans-serif}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.30;filter:url(#duo);z-index:0}
.sc{position:absolute;inset:0;z-index:1;background:linear-gradient(160deg,rgba(21,28,66,.86),rgba(14,19,48,.92))}
.top{position:relative;z-index:2;display:flex;justify-content:flex-end}
.logo{height:22px;width:auto}
.mid{position:relative;z-index:2;flex:1;padding-top:12px}
h1{font-family:"Fraunces",serif;font-weight:600;font-size:26px;line-height:1.02;letter-spacing:-.02em;color:#fff}
.cta{position:relative;z-index:2;display:flex;justify-content:flex-end}
.btn{display:inline-flex;align-items:center;gap:7px;background:#D6234D;color:#fff;font-weight:600;font-size:14px;letter-spacing:.01em;padding:10px 17px;border-radius:4px}
</style></head><body>
<svg width="0" height="0" style="position:absolute"><filter id="duo" color-interpolation-filters="sRGB"><feColorMatrix type="matrix" values="0.299 0.587 0.114 0 0 0.299 0.587 0.114 0 0 0.299 0.587 0.114 0 0 0 0 0 1 0"/><feComponentTransfer><feFuncR type="table" tableValues="0.082 0.870"/><feFuncG type="table" tableValues="0.110 0.895"/><feFuncB type="table" tableValues="0.259 0.965"/></feComponentTransfer></filter></svg>
<div class="ad"><img class="bg" src="../images/grid-1.jpg" alt=""><div class="sc"></div>
<div class="top"><img class="logo" src="../images/ari-logo-white.svg" alt="ARI"></div>
<div class="mid"><h1>Here&rsquo;s what you can do about data centers.</h1></div>
<div class="cta"><span class="btn">Read the playbook &rarr;</span></div>
</div></body></html>
