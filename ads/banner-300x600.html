<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=Fraunces:opsz,wght@9..144,600&family=Newsreader:opsz,wght@6..72,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:300px;height:600px;overflow:hidden}
.ad{position:relative;width:300px;height:600px;overflow:hidden;background:#151C42;display:flex;flex-direction:column;padding:30px 28px;font-family:"Archivo",sans-serif}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.32;filter:url(#duo);z-index:0}
.sc{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(21,28,66,.84),rgba(21,28,66,.6) 45%,rgba(14,19,48,.92))}
.r{position:relative;z-index:2}
.logo{height:26px;width:auto}
.kick{font-weight:600;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#D6234D;margin-top:28px}
h1{font-family:"Fraunces",serif;font-weight:600;font-size:40px;line-height:1.0;letter-spacing:-.025em;color:#fff;margin-top:14px}
.sub{font-family:"Newsreader",serif;font-size:16px;line-height:1.4;color:#c8ccd8;margin-top:18px}
.ekg{margin-top:auto;width:calc(100% + 56px);margin-left:-28px}
.ekg svg{width:100%;height:46px;display:block}
.ekg path{fill:none;stroke:#D6234D;stroke-width:3;stroke-linejoin:round;stroke-linecap:round}
.btn{display:inline-flex;align-items:center;gap:8px;background:#D6234D;color:#fff;font-weight:600;font-size:15px;padding:12px 20px;border-radius:4px;margin-top:26px}
.url{font-weight:600;font-size:12px;letter-spacing:.04em;color:#aeb4c6;margin-top:16px}
</style></head><body>
<svg width="0" height="0" style="position:absolute"><filter id="duo" color-interpolation-filters="sRGB"><feColorMatrix type="matrix" values="0.299 0.587 0.114 0 0 0.299 0.587 0.114 0 0 0.299 0.587 0.114 0 0 0 0 0 1 0"/><feComponentTransfer><feFuncR type="table" tableValues="0.082 0.870"/><feFuncG type="table" tableValues="0.110 0.895"/><feFuncB type="table" tableValues="0.259 0.965"/></feComponentTransfer></filter></svg>
<div class="ad"><img class="bg" src="../images/grid-1.jpg" alt=""><div class="sc"></div>
<div class="r"><img class="logo" src="../images/ari-logo-white.svg" alt="ARI"></div>
<div class="r"><p class="kick">A data center near you?</p>
<h1>Here&rsquo;s what you can do about data centers.</h1>
<p class="sub">They reshape your community&rsquo;s budget, grid, and neighborhood &mdash; and you have a say.</p></div>
<div class="ekg r"><svg viewBox="0 0 300 60" preserveAspectRatio="none"><path d="M0,30 H120 l8,-22 7,46 7,-30 6,8 H300"/></svg></div>
<div class="r"><span class="btn">Read the playbook &rarr;</span><p class="url">datacenterplaybook.org</p></div>
</div></body></html>
