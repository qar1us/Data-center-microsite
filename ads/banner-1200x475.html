<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=Fraunces:opsz,wght@9..144,600&family=Newsreader:opsz,wght@6..72,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:1200px;height:475px;overflow:hidden}
.ad{position:relative;width:1200px;height:475px;overflow:hidden;background:#151C42;display:flex;flex-direction:column;padding:54px 64px;font-family:"Archivo",sans-serif}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.34;filter:url(#duo);z-index:0}
.sc{position:absolute;inset:0;z-index:1;background:linear-gradient(108deg,rgba(21,28,66,.9),rgba(21,28,66,.6) 58%,rgba(14,19,48,.88))}
.top{position:relative;z-index:2;display:flex;justify-content:space-between;align-items:center}
.logo{height:46px;width:auto}
.kick{font-weight:600;font-size:18px;letter-spacing:.18em;text-transform:uppercase;color:#D6234D}
.mid{position:relative;z-index:2;margin-top:auto}
h1{font-family:"Fraunces",serif;font-weight:600;font-size:68px;line-height:.98;letter-spacing:-.025em;color:#fff;max-width:820px;margin-bottom:20px}
.sub{font-family:"Newsreader",serif;font-size:25px;line-height:1.4;color:#c8ccd8;max-width:680px}
.foot{position:relative;z-index:2;margin-top:auto;padding-top:26px;display:flex;align-items:center;justify-content:flex-end;gap:24px}
.btn{display:inline-flex;align-items:center;gap:9px;background:#D6234D;color:#fff;font-weight:600;font-size:22px;padding:14px 28px;border-radius:5px}
.url{font-weight:600;font-size:20px;letter-spacing:.04em;color:#aeb4c6}
</style></head><body>
<svg width="0" height="0" style="position:absolute"><filter id="duo" color-interpolation-filters="sRGB"><feColorMatrix type="matrix" values="0.299 0.587 0.114 0 0 0.299 0.587 0.114 0 0 0.299 0.587 0.114 0 0 0 0 0 1 0"/><feComponentTransfer><feFuncR type="table" tableValues="0.082 0.870"/><feFuncG type="table" tableValues="0.110 0.895"/><feFuncB type="table" tableValues="0.259 0.965"/></feComponentTransfer></filter></svg>
<div class="ad"><img class="bg" src="../images/grid-1.jpg" alt=""><div class="sc"></div>
<div class="top"><span class="kick">A data center near you?</span><img class="logo" src="../images/ari-logo-white.svg" alt="ARI"></div>
<div class="mid"><h1>Here&rsquo;s what you can do about data centers.</h1>
<p class="sub">They reshape your community&rsquo;s budget, grid, and neighborhood &mdash; and you have a say in the outcome.</p></div>
<div class="foot"><span class="url">datacenterplaybook.org</span><span class="btn">Read the playbook &rarr;</span></div>
</div></body></html>
