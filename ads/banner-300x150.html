<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:300px;height:150px;overflow:hidden}
.ad{position:relative;width:300px;height:150px;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;padding:16px 18px;font-family:"Archivo",sans-serif;background:radial-gradient(130% 130% at 15% 10%,#1c2452,#151C42 55%,#0e1330)}
.logo{height:19px;width:auto}
h1{font-family:"Fraunces",serif;font-weight:600;font-size:19px;line-height:1.04;letter-spacing:-.02em;color:#fff;margin-top:9px}
.btn{display:inline-flex;align-items:center;gap:6px;background:#D6234D;color:#fff;font-weight:600;font-size:12px;padding:8px 14px;border-radius:4px;white-space:nowrap;flex:none}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.url{font-weight:600;font-size:10px;letter-spacing:.02em;color:#9aa1b5;white-space:nowrap}
</style></head><body>
<div class="ad">
<div><img class="logo" src="../images/ari-logo-white.svg" alt="ARI">
<h1>Here&rsquo;s what you can do about data centers.</h1></div>
<div class="row"><span class="btn">Read the playbook &rarr;</span><span class="url">datacenterplaybook.org</span></div>
</div></body></html>
